name: Build and Push (dev)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image variables
        run: |
          set -euo pipefail
          IMAGE_NAME="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" \
            -u "${{ github.actor }}" --password-stdin

      - name: Build and push development images
        run: |
          set -euo pipefail
          docker build \
            -t "${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}" \
            -t "${REGISTRY}/${IMAGE_NAME}:dev" \
            --label org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}" \
            --label org.opencontainers.image.revision="${GITHUB_SHA}" \
            --label org.opencontainers.image.created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label org.opencontainers.image.authors="${{ github.actor }}" \
            --label org.opencontainers.image.title="$(basename "${GITHUB_REPOSITORY}")" \
            --label org.opencontainers.image.description="Development build from main branch" \
            .

          docker push "${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          docker push "${REGISTRY}/${IMAGE_NAME}:dev"